dataset_production:
  collection_protocols:
    - protocol_id: cp_source_seed_lot_mass
      process_id: "field_seed_multiplication"
      flow_role: "Source seed lot used for multiplication"
      record_type: "seed lot receiving record"
      raw_fields: "lot id; supplier or source field; propagation class; mass; moisture basis; seed class"
      collection_method: "weighbridge, calibrated scale, or supplier primary activity record"
      unit: "kg"
      frequency: "per seed lot"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum seed lot mass and normalize to harvested seed output"
      quality_evidence: "scale calibration, receiving record, and seed lot certificate"
    - protocol_id: cp_harvested_seed_mass
      process_id: "field_seed_multiplication"
      flow_role: "Harvested wheat seed crop"
      record_type: "harvest and field receiving record"
      raw_fields: "field id; harvest date; harvested mass; moisture basis"
      collection_method: "weighbridge or calibrated scale"
      unit: "kg"
      frequency: "per harvest event"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum harvested mass at declared moisture basis"
      quality_evidence: "scale calibration and harvest record"
    - protocol_id: cp_fertilizer_input_records
      process_id: "field_seed_multiplication"
      flow_role: "fertilizer inputs"
      record_type: "input application record"
      raw_fields: "product name; nutrient content; product mass; application date; field id"
      collection_method: "farm operation log, invoice, or applicator record"
      unit: "kg product and kg nutrient"
      frequency: "per application"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum product and nutrient mass and normalize to harvested seed output"
      quality_evidence: "invoice, field log, applicator record"
    - protocol_id: cp_irrigation_water_records
      process_id: "field_seed_multiplication"
      flow_role: "irrigation water"
      record_type: "irrigation record"
      raw_fields: "water source; volume or mass; pumping period; field id"
      collection_method: "meter reading, pumping log, or water invoice"
      unit: "kg or m3 converted to kg"
      frequency: "per irrigation event"
      temporal_coverage: "crop cycle"
      site_scope: "irrigated seed multiplication field"
      aggregation_rule: "sum irrigation water and convert to mass where needed"
      quality_evidence: "meter record, pumping log, or water invoice"
    - protocol_id: cp_field_fuel_records
      process_id: "field_seed_multiplication"
      flow_role: "field machinery fuel"
      record_type: "field operation fuel record"
      raw_fields: "operation; machine; fuel type; fuel quantity; field id"
      collection_method: "fuel log, invoice, or machine telematics"
      unit: "kg or L converted to kg"
      frequency: "per field operation"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum fuel by operation and normalize to harvested seed output"
      quality_evidence: "fuel log, invoice, or telematics record"
    - protocol_id: cp_crop_protection_records
      process_id: "field_seed_multiplication"
      flow_role: "crop protection products"
      record_type: "crop protection application record"
      raw_fields: "product name; active ingredient; formulated product mass; application date; field id"
      collection_method: "farm spray log or applicator record"
      unit: "kg active ingredient or kg product"
      frequency: "per application"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum active ingredient or product mass and normalize to harvested seed output"
      quality_evidence: "spray log, product label, or applicator record"
    - protocol_id: cp_land_use_records
      process_id: "field_seed_multiplication"
      flow_role: "land occupation"
      record_type: "field area record"
      raw_fields: "field id; planted area; crop duration"
      collection_method: "farm field record or GIS area record"
      unit: "ha and crop duration"
      frequency: "per crop cycle"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "multiply area by crop duration where area-time is required"
      quality_evidence: "field map, GIS record, or farm record"
    - protocol_id: cp_field_residue_records
      process_id: "field_seed_multiplication"
      flow_role: "straw or field residue"
      record_type: "residue handling record"
      raw_fields: "field id; residue stream; mass; fate"
      collection_method: "baling ticket, scale record, or field residue management log"
      unit: "kg"
      frequency: "per residue handling event"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum residue mass crossing the boundary and declare fate"
      quality_evidence: "scale record, baling ticket, or field log"
    - protocol_id: cp_cleaned_seed_mass
      process_id: "seed_conditioning_and_treatment"
      flow_role: "Cleaned wheat seed for sowing"
      record_type: "conditioning output record"
      raw_fields: "batch id; cleaned seed mass; moisture basis; physical purity; germination rate"
