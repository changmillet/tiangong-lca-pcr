  - id: "ipcc-2019-managed-soils-n2o"
    type: "official method guidance"
    reference: "<https://www.ipcc-nggip.iges.or.jp/public/2019rf/pdf/4_Volume4/19R_V4_Ch11_Soils_N2O_CO2.pdf>"
    used_for: "N2O direct emission factor and nitrogen emission calculation"
