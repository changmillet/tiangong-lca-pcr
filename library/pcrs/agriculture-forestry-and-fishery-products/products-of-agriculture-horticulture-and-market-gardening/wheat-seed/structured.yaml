dataset_production:
  collection_protocols:
    - protocol_id: cp_source_seed_lot_mass
      process_id: "field_seed_multiplication"
      flow_role: "Source seed lot used for multiplication"
      record_type: "seed lot receiving record"
      raw_fields: "lot id; supplier or source field; propagation class; mass; moisture basis; seed class"
      collection_method: "weighbridge, calibrated scale, or supplier primary activity record"
      unit: "kg"
      frequency: "per seed lot"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum seed lot mass and normalize to harvested seed output"
      quality_evidence: "scale calibration, receiving record, and seed lot certificate"
    - protocol_id: cp_harvested_seed_mass
      process_id: "field_seed_multiplication"
      flow_role: "Harvested wheat seed crop"
      record_type: "harvest and field receiving record"
      raw_fields: "field id; harvest date; harvested mass; moisture basis"
      collection_method: "weighbridge or calibrated scale"
      unit: "kg"
      frequency: "per harvest event"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum harvested mass at declared moisture basis"
      quality_evidence: "scale calibration and harvest record"
    - protocol_id: cp_fertilizer_input_records
      process_id: "field_seed_multiplication"
      flow_role: "fertilizer inputs"
      record_type: "input application record"
      raw_fields: "product name; nutrient content; product mass; application date; field id"
      collection_method: "farm operation log, invoice, or applicator record"
      unit: "kg product and kg nutrient"
      frequency: "per application"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum product and nutrient mass and normalize to harvested seed output"
      quality_evidence: "invoice, field log, applicator record"
    - protocol_id: cp_irrigation_water_records
      process_id: "field_seed_multiplication"
      flow_role: "irrigation water"
      record_type: "irrigation record"
      raw_fields: "water source; volume or mass; pumping period; field id"
      collection_method: "meter reading, pumping log, or water invoice"
      unit: "kg or m3 converted to kg"
      frequency: "per irrigation event"
      temporal_coverage: "crop cycle"
      site_scope: "irrigated seed multiplication field"
      aggregation_rule: "sum irrigation water and convert to mass where needed"
      quality_evidence: "meter record, pumping log, or water invoice"
    - protocol_id: cp_field_fuel_records
      process_id: "field_seed_multiplication"
      flow_role: "field machinery fuel"
      record_type: "field operation fuel record"
      raw_fields: "operation; machine; fuel type; fuel quantity; field id"
      collection_method: "fuel log, invoice, or machine telematics"
      unit: "kg or L converted to kg"
      frequency: "per field operation"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum fuel by operation and normalize to harvested seed output"
      quality_evidence: "fuel log, invoice, or telematics record"
    - protocol_id: cp_crop_protection_records
      process_id: "field_seed_multiplication"
      flow_role: "crop protection products"
      record_type: "crop protection application record"
      raw_fields: "product name; active ingredient; formulated product mass; application date; field id"
      collection_method: "farm spray log or applicator record"
      unit: "kg active ingredient or kg product"
      frequency: "per application"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum active ingredient or product mass and normalize to harvested seed output"
      quality_evidence: "spray log, product label, or applicator record"
    - protocol_id: cp_land_use_records
      process_id: "field_seed_multiplication"
      flow_role: "land occupation"
      record_type: "field area record"
      raw_fields: "field id; planted area; crop duration"
      collection_method: "farm field record or GIS area record"
      unit: "ha and crop duration"
      frequency: "per crop cycle"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "multiply area by crop duration where area-time is required"
      quality_evidence: "field map, GIS record, or farm record"
    - protocol_id: cp_field_residue_records
      process_id: "field_seed_multiplication"
      flow_role: "straw or field residue"
      record_type: "residue handling record"
      raw_fields: "field id; residue stream; mass; fate"
      collection_method: "baling ticket, scale record, or field residue management log"
      unit: "kg"
      frequency: "per residue handling event"
      temporal_coverage: "crop cycle"
      site_scope: "seed multiplication site"
      aggregation_rule: "sum residue mass crossing the boundary and declare fate"
      quality_evidence: "scale record, baling ticket, or field log"
    - protocol_id: cp_cleaned_seed_mass
      process_id: "seed_conditioning_and_treatment"
      flow_role: "Cleaned wheat seed for sowing"
      record_type: "conditioning output record"
      raw_fields: "batch id; cleaned seed mass; moisture basis; physical purity; germination rate"
      collection_method: "calibrated scale plus quality test record"
      unit: "kg"
      frequency: "per cleaned seed batch"
      temporal_coverage: "conditioning campaign"
      site_scope: "seed conditioning facility"
      aggregation_rule: "sum accepted cleaned seed batches at declared moisture basis"
      quality_evidence: "scale calibration and seed quality test"
    - protocol_id: cp_reject_mass
      process_id: "seed_conditioning_and_treatment"
      flow_role: "Screenings, rejected seed, dust, and off-grade material"
      record_type: "conditioning reject record"
      raw_fields: "batch id; reject stream; mass; fate"
      collection_method: "calibrated scale or container mass balance"
      unit: "kg"
      frequency: "per conditioning batch"
      temporal_coverage: "conditioning campaign"
      site_scope: "seed conditioning facility"
      aggregation_rule: "sum reject streams and declare fate"
      quality_evidence: "scale record, reject log, and fate record"
    - protocol_id: cp_conditioning_energy_records
      process_id: "seed_conditioning_and_treatment"
      flow_role: "conditioning energy"
      record_type: "facility energy record"
      raw_fields: "meter id; energy type; quantity; period; process line"
      collection_method: "meter reading, utility bill, or equipment log"
      unit: "kWh, MJ, or fuel kg"
      frequency: "per conditioning campaign"
      temporal_coverage: "conditioning campaign"
      site_scope: "seed conditioning facility"
      aggregation_rule: "allocate and normalize energy to cleaned seed output"
      quality_evidence: "meter record, utility bill, or equipment log"
    - protocol_id: cp_seed_treatment_records
      process_id: "seed_conditioning_and_treatment"
      flow_role: "seed treatment chemicals"
      record_type: "seed treatment application record"
      raw_fields: "treatment product; active ingredient; dose; treated seed mass; batch id"
      collection_method: "treatment log or supplier treatment certificate"
      unit: "kg active ingredient or kg product"
      frequency: "per treated batch"
      temporal_coverage: "conditioning campaign"
      site_scope: "seed conditioning facility"
      aggregation_rule: "sum treatment chemical mass and normalize to treated seed mass"
      quality_evidence: "treatment log, product label, or supplier certificate"
    - protocol_id: cp_packaging_input_records
      process_id: "seed_conditioning_and_treatment"
      flow_role: "packaging units"
      record_type: "packaging use record"
      raw_fields: "packaging type; item count; capacity; mass when available; batch id"
      collection_method: "packaging inventory issue record or packing line log"
      unit: "item and kg where available"
      frequency: "per packaged batch"
      temporal_coverage: "conditioning campaign"
      site_scope: "seed conditioning facility"
      aggregation_rule: "sum packaging items and convert to mass when required"
      quality_evidence: "packing log or packaging inventory record"
    - protocol_id: cp_packaging_waste_records
      process_id: "seed_conditioning_and_treatment"
      flow_role: "packaging waste"
      record_type: "packaging waste record"
      raw_fields: "waste type; mass; fate; batch or period"
      collection_method: "scale record or waste contractor record"
      unit: "kg"
      frequency: "per waste shipment or campaign"
      temporal_coverage: "conditioning campaign"
      site_scope: "seed conditioning facility"
      aggregation_rule: "sum packaging waste by fate"
      quality_evidence: "scale ticket or waste contractor record"
    - protocol_id: cp_cleaning_dust_records
      process_id: "seed_conditioning_and_treatment"
      flow_role: "cleaning dust emitted to air"
      record_type: "dust collection or emission record"
      raw_fields: "dust collector mass; emission estimate; operating period"
      collection_method: "dust collector log, maintenance record, or emission calculation"
      unit: "kg"
      frequency: "per campaign or operating period"
      temporal_coverage: "conditioning campaign"
      site_scope: "seed conditioning facility"
      aggregation_rule: "sum collected or emitted dust and normalize to cleaned seed output"
      quality_evidence: "dust collector log or emission calculation"
    - protocol_id: cp_storage_energy_records
      process_id: "storage_and_delivery"
      flow_role: "storage electricity"
      record_type: "storage energy record"
      raw_fields: "meter id; energy quantity; storage period; stored mass"
      collection_method: "meter reading or utility bill"
      unit: "kWh or MJ"
      frequency: "per storage period"
      temporal_coverage: "declared storage duration"
      site_scope: "storage site"
      aggregation_rule: "allocate storage energy by stored mass and duration"
      quality_evidence: "meter record or utility bill"
    - protocol_id: cp_delivery_transport_records
      process_id: "storage_and_delivery"
      flow_role: "delivery transport fuel"
      record_type: "transport service record"
      raw_fields: "route; distance; vehicle; fuel quantity or tonne-km; delivered mass"
      collection_method: "fuel log, carrier invoice, or transport dispatch record"
      unit: "kg fuel or tonne-km"
      frequency: "per shipment"
      temporal_coverage: "delivery period"
      site_scope: "declared delivery route"
      aggregation_rule: "sum route-specific transport service and normalize to delivered seed"
      quality_evidence: "carrier invoice, dispatch record, or fuel log"
    - protocol_id: cp_delivered_seed_mass
      process_id: "storage_and_delivery"
      flow_role: "declared delivered product"
      record_type: "delivery or dispatch record"
      raw_fields: "lot id; delivered mass; delivery date; receiver or gate; moisture basis"
      collection_method: "weighbridge, calibrated scale, or dispatch record"
      unit: "kg"
      frequency: "per shipment"
      temporal_coverage: "delivery period"
      site_scope: "declared delivery route"
      aggregation_rule: "sum delivered seed mass at declared moisture basis"
      quality_evidence: "dispatch record, scale ticket, or delivery note"
    - protocol_id: cp_storage_loss_records
      process_id: "storage_and_delivery"
      flow_role: "storage loss or damaged seed"
      record_type: "storage loss record"
      raw_fields: "lot id; loss mass; damage category; fate"
      collection_method: "inventory reconciliation, scale record, or disposal record"
      unit: "kg"
      frequency: "per storage period or lot"
      temporal_coverage: "declared storage duration"
      site_scope: "storage site"
      aggregation_rule: "sum storage loss and declare fate"
      quality_evidence: "inventory reconciliation, scale record, or disposal record"
  calculation_rules:
    - id: normalize_source_seed_lot_input
      applies_to: "source seed lot input"
      rule: "source seed lot kg / harvested seed kg * reference output"
      inputs:
        - cp_source_seed_lot_mass
        - cp_harvested_seed_mass
      output: "kg source seed lot per reference output"
      source_ids: []
    - id: normalize_cleaning_yield
      applies_to: "seed conditioning yield"
      rule: "cleaned seed kg / harvested seed crop input kg"
      inputs:
        - cp_cleaned_seed_mass
        - "harvested seed crop input record"
      output: "cleaning yield and reject rate"
      source_ids:
        - usda-seed-cleaning-handling
    - id: calculate_water_withdrawal
      applies_to: "irrigation water withdrawal"
      rule: "convert metered irrigation volume to mass and normalize to harvested seed output"
      inputs:
        - cp_irrigation_water_records
        - cp_harvested_seed_mass
      output: "kg water withdrawal per reference output"
      source_ids: []
    - id: calculate_field_energy_co2
      applies_to: "field energy fossil CO2"
      rule: "fuel quantity * declared fuel emission factor, normalized to harvested seed output"
      inputs:
        - cp_field_fuel_records
        - cp_harvested_seed_mass
      output: "kg fossil CO2 from field energy per reference output"
      source_ids: []
    - id: calculate_conditioning_energy_co2
      applies_to: "conditioning energy fossil CO2"
      rule: "conditioning energy quantity * declared energy emission factor, normalized to cleaned seed output"
      inputs:
        - cp_conditioning_energy_records
        - cp_cleaned_seed_mass
      output: "kg fossil CO2 from conditioning energy per reference output"
      source_ids: []
    - id: calculate_storage_delivery_energy_co2
      applies_to: "storage and delivery fossil CO2"
      rule: "storage energy and delivery transport energy * declared emission factors, normalized to delivered or stored seed"
      inputs:
        - cp_storage_energy_records
        - cp_delivery_transport_records
      output: "kg fossil CO2 from storage and delivery energy per reference output"
      source_ids: []
  data_quality_requirements:
    - id: dq_seed_identity
      applies_to: "seed lot and cleaned seed identity"
      requirement: "Seed class, propagation class, treatment status, moisture basis, physical purity, and germination rate must be declared for the reference flow and source seed lots."
      evidence: "seed certificate, quality test, or receiving record"
    - id: dq_mass_records
      applies_to: "mass records"
      requirement: "Mass values must identify record date, site or batch, unit, moisture basis where relevant, and measurement device or source record."
      evidence: "calibration record, weighbridge ticket, scale log, or supplier primary activity record"
    - id: dq_temporal_coverage
      applies_to: "crop-cycle data"
      requirement: "Field production data should cover the declared crop cycle; weather-sensitive comparative work should disclose whether one-year or multi-year average data are used."
      evidence: "crop-year production records"
published_dataset_profile:
  dataset_role: "unit_process"
  downstream_use: "secondary_dataset; background_dataset"
  allowed_use: "downstream wheat seed or wheat cultivation data construction where seed class, treatment status, geography, moisture basis, and declared gate match the dataset metadata"
  excluded_use: "commodity wheat grain, seed production outside the declared route, and studies requiring omitted breeding research or capital goods burdens"
  required_metadata: "reference flow; geography; crop cycle; seed class; treatment status; moisture basis; physical purity; germination rate; declared gate; collection protocol coverage; DQR"
  required_quality_disclosure: "record coverage, calculation rules, measurement devices or primary records, unresolved omissions, and data quality scores"
  update_trigger: "material change in production route, geography, seed treatment, conditioning technology, reference flow qualifiers, collection protocol coverage, or data quality score"
data_sources:
  - id: "fao-wheat-seed-production"
    type: "official guidance"
    reference: "<https://www.fao.org/4/y4011e/y4011e0v.htm>"
    used_for: "seed certification, quality control, seed quality attributes, and process boundary"
  - id: "unl-wheat-seeding-rate"
    type: "extension guidance"
    reference: "<https://cropwatch.unl.edu/determining-seeding-rate-your-winter-wheat/>"
    used_for: "seeding rate and thousand-kernel weight method context"
  - id: "umn-small-grain-seeding-rate"
    type: "extension guidance"
    reference: "<https://extension.umn.edu/planting-small-grains/seeding-rate-small-grains>"
    used_for: "seeding rate formula, stand loss, and germination method context"
  - id: "usda-seed-cleaning-handling"
    type: "official handbook"
    reference: "<https://www.govinfo.gov/content/pkg/GOVPUB-A-PURL-gpo20323/pdf/GOVPUB-A-PURL-gpo20323.pdf>"
