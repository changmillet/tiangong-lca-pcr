dataset_production:
  collection_protocols:
    - protocol_id: cp_seed_stocking_records
      process_id: "seed_supply_hatchery_and_nursery"
      flow_role: "seed or juvenile abalone input and stocked juvenile output"
      record_type: "hatchery transfer, supplier invoice, stocking log, health certificate"
      raw_fields: "species; batch id; supplier or hatchery; count; mean mass; total mass; size grade; health status; transfer date"
      collection_method: "supplier records, hatchery logs, stocking count, sampling and weighing"
      unit: "item and kg"
      frequency: "each stocking event"
      temporal_coverage: "complete production batch or reporting year"
      site_scope: "supplier, hatchery, nursery, and grow-out unit"
      aggregation_rule: "sum stocked counts and masses by batch; calculate mean mass and survival to grow-out transfer"
      quality_evidence: "signed transfer records, sampling sheet, weighing record, health or permit evidence"
    - protocol_id: cp_feed_records
      process_id: "growout_husbandry"
      flow_role: "macroalgae, seaweed, and formulated feed"
      record_type: "feed issue log, supplier invoice, feed formulation, leftover record"
      raw_fields: "feed product; wet/dry/as-fed basis; moisture; quantity issued; leftovers; feed source; marine ingredient fraction when relevant"
      collection_method: "feed inventory, supplier declarations, farm feeding logs"
      unit: "kg"
      frequency: "each feed issue or batch summary"
      temporal_coverage: "full grow-out period"
      site_scope: "grow-out unit or farm"
      aggregation_rule: "normalize net feed supplied to harvest-size output; retain wet/dry conversion basis"
      quality_evidence: "feed purchase records, supplier formulation, stock movement logs"
    - protocol_id: cp_water_intake_and_discharge_records
      process_id: "seed_supply_hatchery_and_nursery_growout_husbandry_harvest_grading_and_live_holding"
      flow_role: "water intake, pumped seawater, live holding water, wastewater, and discharge"
      record_type: "meter readings, pump logs, discharge permits, water-quality records"
      raw_fields: "intake volume; make-up water; recirculated volume; discharge volume; water source; discharge route; treatment; salinity where relevant"
      collection_method: "meter, pump runtime calculation, permit report, or water management log"
      unit: "m3 or kg"
      frequency: "daily, batch, or reporting period"
      temporal_coverage: "process-specific operation period"
      site_scope: "hatchery, grow-out, live holding, packhouse, and discharge point"
      aggregation_rule: "reconcile intake, recirculation, and discharge; normalize to process output and reference flow"
      quality_evidence: "meter calibration, permit report, water-quality monitoring record"
    - protocol_id: cp_energy_records
      process_id: "seed_supply_hatchery_and_nursery_growout_husbandry_harvest_grading_and_live_holding"
      flow_role: "electricity and non-fuel energy"
      record_type: "meter reading, utility bill, submeter, equipment log"
      raw_fields: "electricity use; meter id; process allocation; operating hours; chilling or pumping service"
      collection_method: "utility bill, submeter, runtime allocation"
      unit: "kWh or MJ"
      frequency: "monthly or batch"
      temporal_coverage: "reporting period and production batch overlap"
      site_scope: "farm, hatchery, grow-out unit, or packhouse"
      aggregation_rule: "allocate by metered subprocess first, then operating hours or product mass"
      quality_evidence: "utility bill, submeter records, allocation worksheet"
    - protocol_id: cp_fuel_and_transport_records
      process_id: "growout_husbandry_delivery_to_declared_gate"
      flow_role: "diesel, vessel fuel, vehicle fuel, and delivery energy"
      record_type: "fuel purchase, tank drawdown, vessel log, delivery log"
      raw_fields: "fuel type; quantity; route; vehicle or vessel; distance; load; process purpose"
      collection_method: "fuel invoice, tank gauge, vehicle or vessel log"
      unit: "L, kg, MJ, or tonne-km"
      frequency: "each trip or reporting period"
      temporal_coverage: "grow-out, harvest, or delivery period"
      site_scope: "directly controlled routes and equipment"
      aggregation_rule: "normalize fuel or tonne-km to product mass; avoid double counting supplier-delivered inputs"
      quality_evidence: "fuel invoice, odometer or vessel log, delivery manifest"
    - protocol_id: cp_mortality_and_residue_records
      process_id: "seed_supply_hatchery_and_nursery_growout_husbandry_harvest_grading_and_live_holding"
      flow_role: "mortalities, shells, residues, rejects, and biofouling"
      record_type: "mortality log, reject sheet, waste manifest, recovery record"
      raw_fields: "count; mass; reason; fate; date; culture unit; shell or organic residue category"
      collection_method: "farm log, weighing, waste contractor record"
      unit: "item and kg"
      frequency: "event, batch, or reporting period"
      temporal_coverage: "full production batch or pack-out period"
      site_scope: "hatchery, grow-out unit, packhouse, waste handling route"
      aggregation_rule: "sum by fate and normalize to process output and reference product"
      quality_evidence: "signed waste record, farm mortality log, mass balance"
    - protocol_id: cp_harvest_and_product_records
      process_id: "growout_husbandry_harvest_grading_and_live_holding"
      flow_role: "harvest-size product, marketable reference product, and off-grade product"
      record_type: "harvest log, grading sheet, sales invoice, pack-out record"
      raw_fields: "harvest date; culture unit; product form; live/fresh/chilled state; shell-on or shucked basis; grade; count; mass; destination"
      collection_method: "harvest weighing, grader records, packhouse records, invoice"
      unit: "kg and item"
      frequency: "each harvest or pack-out batch"
      temporal_coverage: "declared production batch or reporting period"
      site_scope: "harvest area, packhouse, and declared gate"
      aggregation_rule: "reconcile harvested input, marketable output, off-grade product, rejects, and reference product"
      quality_evidence: "calibrated scale record, sales invoice, batch reconciliation"
    - protocol_id: cp_packaging_records
      process_id: "harvest_grading_and_live_holding"
      flow_role: "boxes, liners, bags, labels, ice packs, and pallets"
      record_type: "packaging issue log, purchase invoice, bill of materials"
      raw_fields: "packaging item; material; item count; tare mass; capacity; reuse rate; destination"
      collection_method: "warehouse issue record, bill of materials, supplier invoice"
      unit: "kg and item"
      frequency: "each pack-out batch or reporting period"
      temporal_coverage: "pack-out period"
      site_scope: "packhouse and delivery preparation"
      aggregation_rule: "convert count to mass using tare or supplier data; normalize to reference product"
      quality_evidence: "supplier specification, packaging issue sheet, scale record"
  calculation_rules:
    - id: normalize_to_reference_flow
      applies_to: "all foreground rows"
      rule: "normalized_amount = measured_or_calculated_amount / marketable_reference_product_mass. Preserve raw records and product-form basis."
      inputs:
        - "measured amount"
        - marketable_reference_product_mass
      output: "amount per 1 kg reference product"
      source_ids:
        - mass-balance-identity
    - id: calculate_stocking_survival
      applies_to: "seed_supply_hatchery_and_nursery and growout_husbandry"
      rule: "survival_to_harvest = harvested_count / stocked_count, with count-to-mass conversion retained separately."
      inputs:
        - stocked_count
        - harvested_count
        - mortality_count
      output: "survival indicator and QA check"
      source_ids:
        - mass-balance-identity
    - id: calculate_feed_conversion_indicator
      applies_to: "growout_husbandry"
      rule: "feed_conversion_indicator = net_feed_mass / harvest_size_abalone_mass on the declared feed mass basis. Do not compare wet and dry feed without conversion evidence."
      inputs:
        - feed_mass
        - "moisture basis"
        - harvest_size_abalone_mass
      output: "feed mass per kg harvest-size abalone"
      source_ids:
        - asc-farm-standard-2025
    - id: reconcile_packout_mass
      applies_to: "harvest_grading_and_live_holding"
      rule: "harvested_input_mass = reference_product_mass + offgrade_saleable_mass + reject_mass + measured holding loss on the same product-form basis."
      inputs:
        - harvested_input_mass
        - reference_product_mass
        - offgrade_mass
        - reject_mass
        - holding_loss
      output: "pack-out mass balance"
      source_ids:
        - mass-balance-identity
    - id: calculate_controlled_discharge
      applies_to: "water intake and discharge rows"
      rule: "controlled_discharge = measured_discharge or intake - retained_product_water - recirculated_volume adjustment when meters are incomplete."
      inputs:
        - intake
        - discharge
        - "recirculated volume"
        - "retained water"
      output: "discharge volume by process"
      source_ids:
        - mass-balance-identity
    - id: calculate_delivery_transport_service
      applies_to: "delivery_to_declared_gate"
      rule: "transport_service = delivered_product_mass_tonnes * one-way controlled delivery distance."
      inputs:
        - "delivered mass"
        - "controlled distance"
      output: "tonne-kilometres"
      source_ids:
        - mass-balance-identity
  data_quality_requirements:
    - id: identity_and_scope
      applies_to: "all datasets"
      requirement: "Declare CPC code, species or hybrid, culture system, seed source, product form, geography, and declared gate."
      evidence: "dataset metadata, stocking records, product description, permit or certification evidence"
    - id: mass_basis_consistency
      applies_to: "reference product, seed, harvest, pack-out, and rejects"
      requirement: "Keep shell-on, shucked, live, fresh, chilled, drained, wet, and dry bases separate unless measured conversion evidence exists."
      evidence: "scale records, product specifications, moisture or drainage evidence"
    - id: feed_and_water_disclosure
      applies_to: "grow-out and hatchery rows"
      requirement: "Retain feed type, feed basis, water source, water discharge route, and water quality monitoring where applicable."
      evidence: "feed logs, supplier data, water meter, discharge permit, monitoring report"
    - id: mortality_and_residue_completeness
      applies_to: "seed, grow-out, and pack-out rows"
      requirement: "Record mortalities, rejects, shell residue, biofouling residue, and fate by batch or reporting period."
      evidence: "mortality log, reject sheet, waste manifest, recovery record"
    - id: allocation_transparency
      applies_to: "multi-grade or multi-species systems"
      requirement: "State the partitioning or allocation basis before publishing a secondary or background dataset."
      evidence: "allocation worksheet, grade mass records, culture-unit records"
    - id: temporal_representativeness
      applies_to: "all foreground rows"
      requirement: "Cover a complete production batch, harvest lot, or representative reporting period; disclose partial-cycle datasets."
      evidence: "production calendar, stocking and harvest dates, reporting-period records"
published_dataset_profile:
  dataset_role: "foreground production package that may be published as a secondary_dataset or background_dataset after review"
  downstream_use: "use as farmed abalone input to seafood processing, food service, retail, cold-chain, or regional food-product lifecycle models"
  allowed_use: "farmed abalone live, fresh, or chilled datasets with declared species, culture system, product form, gate, feed regime, and quality disclosures"
  excluded_use: "wild abalone, frozen/smoked/dried/salted/brined/prepared abalone, generic mollusc datasets, and datasets lacking product-form or culture-system disclosure"
  required_metadata: "canonical PCR id; CPC code; species or hybrid; culture system; seed source; product form; shell-on or shucked basis; size grade; geography; declared gate; holding or chilling duration; feed regime; data period; allocation basis"
  required_quality_disclosure: "missing UUIDs; unresolved seawater or habitat flow identities; feed wet/dry conversion; water discharge route; mortality completeness; pack-out mass balance; partial-cycle or proxy data use"
  update_trigger: "revise when CPC mapping changes, Tiangong abalone, seawater, feed, discharge, or habitat flow identities are updated, ASC or equivalent aquaculture standards change, or reviewed foreground abalone datasets provide better ranges"
