    type: "standard"
    reference: "<https://asc-aqua.org/wp-content/uploads/2023/07/ASC-Abalone-Standard_v1.0.pdf>"
    used_for: "abalone aquaculture issue areas, energy, feed, biosecurity, ecosystem effects, waste management, and scope context"
  - id: "asc-farm-standard-2025"
    type: "standard"
    reference: "<https://programme-centre.asc-aqua.org/app/uploads/2025/08/ASC-STD-001-ASC-Farm-Standard-V1.0.1-Aug-2025.pdf>"
