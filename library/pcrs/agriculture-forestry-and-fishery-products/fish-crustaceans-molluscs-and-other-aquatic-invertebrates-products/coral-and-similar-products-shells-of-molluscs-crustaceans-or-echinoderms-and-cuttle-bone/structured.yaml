          property_unit: "Mass; kg"
          description: "Use this row only when direct fuel combustion emissions are modelled inside the foreground unit process instead of represented through linked fuel combustion datasets."
          amount:
            expression: "Calculated fossil carbon dioxide from directly combusted foreground fuels when combustion is inside the reporting boundary."
