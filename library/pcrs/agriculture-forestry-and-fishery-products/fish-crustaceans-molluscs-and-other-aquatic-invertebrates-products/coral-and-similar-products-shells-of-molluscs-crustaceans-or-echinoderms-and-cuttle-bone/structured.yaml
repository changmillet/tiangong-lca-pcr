dataset_production:
  collection_protocols:
    - protocol_id: cp_source_material_receipt
      process_id: "source_receipt_and_provenance"
      flow_role: "source material received and accepted raw material"
      record_type: "receiving record"
      raw_fields: "batch_id, source_route, material_family, supplier_or_collection_site, received_mass, rejected_mass, accepted_mass, moisture_basis, legal_or_provenance_record"
      collection_method: "Weighbridge, floor scale, supplier delivery note, or direct collection log reconciled to batch record"
      unit: "kg"
      frequency: "each batch"
      temporal_coverage: "reporting period or production campaign"
      site_scope: "receiving facility and controlled collection route"
      aggregation_rule: "Sum accepted mass by source route and normalize to final declared product mass"
      quality_evidence: "scale calibration, delivery tickets, batch ledger, provenance or permit records"
    - protocol_id: cp_collection_or_delivery_energy
      process_id: "source_receipt_and_provenance"
      flow_role: "collection or delivery fuel"
      record_type: "energy and transport log"
      raw_fields: "vehicle_or_vessel_id, route, distance, fuel_type, fuel_quantity, energy_quantity, allocation_basis"
      collection_method: "Fuel invoices, tank logs, vehicle logs, vessel logs, or metered charging records"
      unit: "L, kg, MJ, or kWh"
      frequency: "each trip or monthly"
      temporal_coverage: "reporting period"
      site_scope: "directly controlled collection or delivery routes"
      aggregation_rule: "Allocate to accepted source material by mass or measured trip load"
      quality_evidence: "fuel invoices, odometer or trip logs, meter records"
    - protocol_id: cp_collection_area_records
      process_id: "source_receipt_and_provenance"
      flow_role: "collection area or habitat indicator"
      record_type: "route and legal disclosure record"
      raw_fields: "source_route, geography, collection_area, permit_id, salvage_or_byproduct_source, collection_method, restrictions"
      collection_method: "Permit review, supplier declaration, geospatial record, or site collection log"
      unit: "m2, permit id, or descriptive record"
      frequency: "each source route"
      temporal_coverage: "reporting period"
      site_scope: "collection area, supplier source, or processing-residue source"
      aggregation_rule: "Retain route-specific disclosure with accepted source material mass"
      quality_evidence: "permit, supplier attestation, collection log, traceability record"
    - protocol_id: cp_reject_and_residue_records
      process_id: "source_receipt_and_provenance"
      flow_role: "receipt and sorting rejects"
      record_type: "waste and residue record"
      raw_fields: "batch_id, reject_type, mass, fate, treatment_destination, moisture_basis"
      collection_method: "Weighed rejects, waste transfer note, disposal ticket, or internal residue ledger"
      unit: "kg"
      frequency: "each batch or disposal event"
      temporal_coverage: "reporting period"
      site_scope: "receiving and preparation facility"
      aggregation_rule: "Sum by reject type and fate, then normalize to reference product"
      quality_evidence: "scale record, waste transfer note, disposal invoice"
    - protocol_id: cp_washing_water_records
      process_id: "washing_drying_and_sorting"
      flow_role: "washing or desalting water"
      record_type: "utility record"
      raw_fields: "meter_id, water_source, water_quantity, batch_id, cleaning_step, allocation_basis"
      collection_method: "Water meter, tank refill log, purchased water invoice, or batch cleaning record"
      unit: "m3 or kg"
      frequency: "batch, shift, or monthly"
      temporal_coverage: "reporting period"
      site_scope: "washing and desalting operations"
      aggregation_rule: "Allocate to cleaned sorted output by measured batch or production time"
      quality_evidence: "meter reading, invoice, batch log"
    - protocol_id: cp_preparation_energy_records
      process_id: "washing_drying_and_sorting"
      flow_role: "washing drying and sorting energy"
      record_type: "energy record"
      raw_fields: "meter_id, equipment_id, fuel_type, energy_quantity, operating_time, allocation_basis"
      collection_method: "Sub-meter, main meter allocation, fuel invoice, or equipment runtime log"
      unit: "kWh, MJ, L, or kg"
      frequency: "batch, shift, or monthly"
      temporal_coverage: "reporting period"
      site_scope: "preparation equipment"
      aggregation_rule: "Allocate to cleaned sorted output by sub-metered quantity, runtime, or production mass"
      quality_evidence: "meter record, invoice, equipment runtime log"
    - protocol_id: cp_cleaned_product_mass
      process_id: "washing_drying_and_sorting"
      flow_role: "cleaned sorted product"
      record_type: "production output record"
      raw_fields: "batch_id, cleaned_mass, moisture_basis, grade, particle_size_class, destination"
      collection_method: "Scale ticket, batch production ledger, or inventory transfer record"
      unit: "kg"
      frequency: "each batch"
      temporal_coverage: "reporting period"
      site_scope: "preparation facility"
      aggregation_rule: "Sum by declared grade and normalize to final declared product mass"
      quality_evidence: "scale calibration, batch ledger, inventory record"
    - protocol_id: cp_wastewater_records
      process_id: "washing_drying_and_sorting"
      flow_role: "wastewater or brine"
      record_type: "liquid waste record"
      raw_fields: "batch_id, wastewater_quantity, brine_quantity, sludge_quantity, treatment_destination, discharge_or_transfer_record"
      collection_method: "Flow meter, tank volume balance, treatment plant record, or waste transfer note"
      unit: "m3 or kg"
      frequency: "batch, shift, or disposal event"
      temporal_coverage: "reporting period"
      site_scope: "washing and treatment system"
      aggregation_rule: "Sum by fate and normalize to cleaned sorted output or reference flow"
      quality_evidence: "meter record, treatment log, discharge permit record, transfer note"
    - protocol_id: cp_dust_records
      process_id: "washing_drying_and_sorting"
      flow_role: "dust or particulate matter"
      record_type: "dust control and loss record"
      raw_fields: "equipment_id, dust_collected, filter_change_mass, visible_release_record, emission_factor_if_used"
      collection_method: "Dust collector records, filter mass, housekeeping records, or reviewed facility factor"
      unit: "kg"
      frequency: "shift, batch, or maintenance event"
      temporal_coverage: "reporting period"
      site_scope: "dry handling and dust-control equipment"
      aggregation_rule: "Calculate particulate release or collected dust per cleaned sorted output"
      quality_evidence: "maintenance record, filter log, calculation worksheet"
    - protocol_id: cp_packaging_records
      process_id: "size_reduction_packaging_and_delivery"
      flow_role: "packaging material"
      record_type: "packaging inventory record"
      raw_fields: "packaging_type, packaging_mass, item_count, product_mass_packed, supplier_record"
      collection_method: "Packaging purchase records, inventory issue records, bill of materials, or packing line logs"
      unit: "kg or item count"
      frequency: "batch or monthly"
      temporal_coverage: "reporting period"
      site_scope: "packing line or warehouse"
      aggregation_rule: "Normalize packaging to declared product at gate"
      quality_evidence: "purchase record, inventory issue, packing log"
    - protocol_id: cp_size_reduction_packaging_energy
      process_id: "size_reduction_packaging_and_delivery"
      flow_role: "final preparation energy"
      record_type: "energy record"
      raw_fields: "meter_id, equipment_id, fuel_type, energy_quantity, operating_time, allocation_basis"
      collection_method: "Sub-meter, fuel invoice, equipment runtime log, or allocation worksheet"
      unit: "kWh, MJ, L, or kg"
      frequency: "batch, shift, or monthly"
      temporal_coverage: "reporting period"
      site_scope: "crushing, grinding, grading, packing, storage, and gate handling"
      aggregation_rule: "Allocate to declared product at gate by sub-metered quantity, runtime, or production mass"
      quality_evidence: "meter record, invoice, runtime log"
    - protocol_id: cp_final_product_mass
      process_id: "size_reduction_packaging_and_delivery"
      flow_role: "declared product at gate"
      record_type: "final production and sales record"
      raw_fields: "batch_id, final_mass, moisture_basis, grade, particle_size_class, packaging_state, dispatch_record"
      collection_method: "Final scale ticket, warehouse release, sales dispatch record, or inventory closeout"
      unit: "kg"
      frequency: "each batch or dispatch"
      temporal_coverage: "reporting period"
      site_scope: "facility gate"
      aggregation_rule: "Sum conforming declared product mass by product state"
      quality_evidence: "scale record, dispatch record, inventory closeout"
    - protocol_id: cp_packaging_waste_records
      process_id: "size_reduction_packaging_and_delivery"
      flow_role: "packaging and off-size waste"
      record_type: "final waste record"
      raw_fields: "waste_type, mass, fate, disposal_or_rework_destination, batch_id"
      collection_method: "Weighed scrap, rework record, waste transfer note, or disposal invoice"
      unit: "kg"
      frequency: "batch or disposal event"
      temporal_coverage: "reporting period"
      site_scope: "final preparation and packing area"
      aggregation_rule: "Sum by fate and normalize to declared product at gate"
      quality_evidence: "scale record, rework ledger, transfer note"
    - protocol_id: cp_direct_fuel_combustion_records
      process_id: "size_reduction_packaging_and_delivery"
      flow_role: "direct fuel combustion emissions"
      record_type: "fuel combustion calculation record"
      raw_fields: "fuel_type, fuel_quantity, heating_value_or_density, emission_factor, combustion_scope"
      collection_method: "Fuel invoice, tank log, and reviewed emission-factor calculation"
      unit: "kg CO2 or fuel unit"
      frequency: "batch or reporting period"
      temporal_coverage: "reporting period"
      site_scope: "direct combustion equipment inside foreground boundary"
      aggregation_rule: "Calculate fossil CO2 from foreground fuel quantity when combustion is modelled directly"
      quality_evidence: "fuel record, factor source, calculation worksheet"
  calculation_rules:
    - id: calculate_accepted_source_mass
      applies_to: "source_receipt_and_provenance"
      rule: "accepted_mass = received_mass - receipt_reject_mass, with all masses on the declared moisture basis."
      inputs:
        - received_mass
        - receipt_reject_mass
      output: "accepted raw biogenic mineral material"
      source_ids:
        - mass-balance-identity
    - id: normalize_to_reference_flow
      applies_to: "all foreground rows"
      rule: "normalized_amount = measured_or_calculated_amount / final_declared_product_mass. Keep the raw record and normalized result."
      inputs:
        - "measured amount"
        - final_declared_product_mass
      output: "amount per 1 kg reference product"
      source_ids:
        - mass-balance-identity
    - id: calculate_cleaned_yield
      applies_to: "washing_drying_and_sorting"
      rule: "cleaned_yield = cleaned_sorted_mass / raw_material_input_mass on the same declared moisture basis."
      inputs:
        - cleaned_sorted_mass
        - raw_material_input_mass
      output: "cleaned sorted yield"
      source_ids:
        - mass-balance-identity
    - id: calculate_direct_fuel_co2_if_modelled
      applies_to: "size_reduction_packaging_and_delivery"
      rule: "fossil_CO2 = foreground_fuel_quantity x reviewed fuel emission factor when direct combustion is inside the foreground boundary."
      inputs:
        - fuel_quantity
        - emission_factor
      output: "fossil carbon dioxide elementary flow"
      source_ids:
        - ipcc-2006-combustion
  data_quality_requirements:
    - id: dq_source_identity
      applies_to: "all source material records"
      requirement: "State material family, source route, geography, and legal or provenance basis for each source route."
      evidence: "supplier declaration, permit, traceability document, or collection log"
    - id: dq_mass_balance
      applies_to: "source receipt, preparation, and final gate product"
      requirement: "Received mass, rejects, cleaned output, final product, and waste masses shall reconcile within facility-defined weighing tolerance."
      evidence: "batch mass balance worksheet and scale records"
    - id: dq_moisture_basis
      applies_to: "all product and waste mass records"
      requirement: "Declare wet, air-dry, oven-dry, or contract moisture basis and do not mix bases without measured conversion evidence."
      evidence: "moisture test, contract basis, or batch declaration"
    - id: dq_wastewater_fate
      applies_to: "washing and desalting operations"
      requirement: "Identify wastewater, brine, sludge, discharge, reuse, treatment, or transfer fate."
      evidence: "treatment log, discharge record, transfer note, or permit evidence"
    - id: dq_dust_controls
      applies_to: "dry handling operations"
      requirement: "Report whether dust is captured, emitted, internally recycled, or treated as waste."
      evidence: "filter logs, dust collector records, or maintenance logs"
    - id: dq_packaging_state
      applies_to: "packed product datasets"
      requirement: "Declare packaging material type, packaging mass or count, and packed product mass."
      evidence: "bill of materials, packing log, or inventory issue record"
published_dataset_profile:
  dataset_role: "unit_process"
  downstream_use: "secondary_dataset; background_dataset"
  allowed_use: "Use as a foreground unit process or linked secondary dataset for CPC 04911 material at facility gate when source route, moisture basis, and processing state match the consuming model."
  excluded_use: "Do not use for live aquatic animal production, food products, finished jewellery or decorative articles, synthetic calcium carbonate, or datasets lacking source route and legal or provenance disclosure."
  required_metadata: "PCR id, PCR version, CPC code 04911, product title, source route, material family, geography, reporting period, moisture basis, grade or particle-size class, final product mass, Tiangong UUID substitutions, and unresolved flow notes."
  required_quality_disclosure: "Report mass balance completeness, source identity evidence, wastewater or brine fate, residue fate, dust-control treatment, packaging state, and any allocation rule used for multiple grades."
  update_trigger: "Update when Tiangong UUID mappings change, CPC mapping changes, source route or legal disclosure rules change, or reviewed range and collection evidence improves."
data_sources:
  - id: "unsd-cpc-3-0-04911"
    type: "official_guidance"
    reference: "United Nations Statistics Division, Central Product Classification Version 3.0, code 04911."
    used_for: "Product classification identity and included product scope."
  - id: "cites-stony-corals"
    type: "official_guidance"
    reference: "CITES guidance and listings for stony corals and related trade controls, as applicable by route and geography."
    used_for: "Legal and provenance disclosure for coral-like source routes."
  - id: "fao-responsible-fisheries-code"
    type: "official_guidance"
    reference: "FAO Code of Conduct for Responsible Fisheries."
    used_for: "Responsible source-route disclosure for fishery and aquaculture by-product routes."
  - id: "codex-fish-code"
    type: "official_guidance"
    reference: "Codex Code of Practice for Fish and Fishery Products."
    used_for: "Hygiene and handling context for shellfish by-product and residue source routes where applicable."
  - id: "iso-14067-2018"
    type: "standard"
    reference: "ISO 14067:2018 Greenhouse gases - Carbon footprint of products - Requirements and guidelines for quantification."
    used_for: "General product carbon footprint boundary, data quality, and reporting alignment."
  - id: "mass-balance-identity"
    type: "method_factor"
    reference: "Conservation of mass applied as a PCR calculation identity for batch input, output, and reject reconciliation."
    used_for: "QA guardrails, yield calculations, and normalization rules."
  - id: "ipcc-2006-combustion"
    type: "method_factor"
    reference: "IPCC 2006 Guidelines for National Greenhouse Gas Inventories, stationary and mobile combustion factor approach."
    used_for: "Direct fuel combustion carbon dioxide calculation when foreground combustion is modelled directly."
