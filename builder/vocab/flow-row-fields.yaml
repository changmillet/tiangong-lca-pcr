schema_version: 1
vocab: flow_row_fields
required_columns:
  - row_id
  - direction
  - flow_type
  - role
  - selected_flow
  - flow_property_unit
  - amount
  - value_mode
  - specificity
  - basis
  - basis_kind
  - evidence_kind
flow_types:
  product:
    description: Product or technosphere flow.
  waste:
    description: Waste flow crossing the process boundary.
  elementary:
    description: Elementary flow crossing the environment boundary.
directions:
  inputs:
    description: Flow entering the process.
  outputs:
    description: Flow leaving the process.
